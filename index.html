<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* Container */
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

/* Logo */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* Heading */
h1 {
    color: #22c55e;
}

/* Buttons */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}

/* Telegram Icon */
.icon {
    width: 20px;
}

/* Blink Animations */
@keyframes blink {
    0% { box-shadow: 0 0 5px; }
    50% { box-shadow: 0 0 20px; }
    100% { box-shadow: 0 0 5px; }
}

.btn-green {
    background: #22c55e;
    color: black;
    animation: blink 1s infinite;
}

.btn-orange {
    background: #f59e0b;
    color: black;
    animation: blink 1s infinite;
}

/* Blur Section */
.blur-section {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 20px;
}

.blur-section::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("team.jpg") center/cover no-repeat;
    filter: blur(8px);
    z-index: 1;
}

.blur-section::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 2;
}

.content {
    position: relative;
    z-index: 3;
    padding: 30px;
}
</style>

</head>

<body>

<div class="container">

    <!-- Logo -->
    <img src="https://cdn-icons-png.flaticon.com/512/857/857455.png" class="logo">

    <h1>🏏 Cricket Hub</h1>
    <p>No.1 Fantasy Prediction Channel</p>

    <!-- Button 1 -->
    <a href="https://t.me/YOUR_LINK" class="btn btn-green">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="icon">
        Click & Join Telegram
    </a>

    <p>Jisko loss cover karna ha jaldi join karo 🔥</p>

    <!-- Button 2 -->
    <a href="https://t.me/YOUR_LINK" class="btn btn-orange">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="icon">
        Join Telegram Now
    </a>

    <p>Loss cover meri responsibility 💯</p>

    <!-- Blur Section -->
    <div class="blur-section">
        <div class="content">
            <h2>🔥 1200+ Winning Records</h2>
            <p>Mega GL Win 100%</p>
            <p>Join Fast Before Match ⏳</p>
        </div>
    </div>

</div>

</body>
</html>
