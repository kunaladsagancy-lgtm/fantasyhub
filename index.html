<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    text-align: center;
}

/* Container */
.container {
    max-width: 380px;
    margin: auto;
    padding: 20px;
}

/* Logo */
.logo {
    width: 70px;
    margin-top: 10px;
}

/* Heading */
h1 {
    color: #4ade80;
    font-size: 26px;
}

p {
    color: #94a3b8;
}

/* Buttons */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    margin: 15px 0;
    border-radius: 12px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

/* Smooth glow instead of blink */
.btn-green {
    background: linear-gradient(90deg, #22c55e, #4ade80);
    color: black;
    box-shadow: 0 0 15px #22c55e;
}

.btn-orange {
    background: linear-gradient(90deg, #f59e0b, #fbbf24);
    color: black;
    box-shadow: 0 0 15px #f59e0b;
}

.btn:hover {
    transform: scale(1.05);
}

/* Icon */
.icon {
    width: 20px;
}

/* Glass Blur Card */
.card {
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
}

/* Background image blur */
.card::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("team.jpg") center/cover no-repeat;
    filter: blur(12px);
    z-index: -1;
    opacity: 0.4;
}

/* Text */
.card h2 {
    color: #facc15;
}

</style>
</head>

<body>

<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/857/857455.png" class="logo">

<h1>🏏 Cricket Hub</h1>
<p>No.1 Fantasy Prediction Channel</p>

<a href="https://t.me/YOUR_LINK" class="btn btn-green">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="icon">
    Click & Join Telegram
</a>

<p>Jisko loss cover karna ha jaldi join karo 🔥</p>

<a href="https://t.me/YOUR_LINK" class="btn btn-orange">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="icon">
    Join Telegram Now
</a>

<p>Loss cover meri responsibility 💯</p>

<div class="card">
    <h2>🔥 1200+ Winning Records</h2>
    <p>Mega GL Win 100%</p>
    <p>Join Fast Before Match ⏳</p>
</div>

</div>

</body>
</html>
