<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* Container */
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

/* Heading */
h1 {
    font-size: 28px;
    color: #22c55e;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #cbd5f5;
}

/* Buttons */
.btn {
    display: block;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
}

/* Green Blink Button */
.btn-green {
    background: #22c55e;
    color: black;
    animation: blinkGreen 1s infinite;
}

/* Orange Blink Button */
.btn-orange {
    background: #f59e0b;
    color: black;
    animation: blinkOrange 1s infinite;
}

/* Blink Animations */
@keyframes blinkGreen {
    0% { box-shadow: 0 0 5px #22c55e; }
    50% { box-shadow: 0 0 20px #22c55e; }
    100% { box-shadow: 0 0 5px #22c55e; }
}

@keyframes blinkOrange {
    0% { box-shadow: 0 0 5px #f59e0b; }
    50% { box-shadow: 0 0 20px #f59e0b; }
    100% { box-shadow: 0 0 5px #f59e0b; }
}

/* Image */
.preview {
    width: 100%;
    border-radius: 10px;
    margin-top: 20px;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #94a3b8;
}
</style>

</head>

<body>

<div class="container">

    <h1>🏏 Cricket Hub</h1>
    <p>India's No.1 Fantasy Prediction Channel</p>

    <a href="#" class="btn btn-green">
        📲 Click & Join Telegram
    </a>

    <p>Jisko loss cover karna hai jaldi join karo 🔥</p>

    <a href="#" class="btn btn-orange">
        🚀 Join Telegram Now
    </a>

    <p>Loss cover meri responsibility 💯</p>

    <img src="https://via.placeholder.com/400x300" class="preview">

    <h3>🔥 1200+ Winning Records</h3>
    <p>Guaranteed GL Winning Tips 💰</p>

    <div class="footer">
        Powered by Cricket Hub
    </div>

</div>

</body>
</html>
